[platformio]
default_envs = esp32s3dev

[env:esp32s3dev]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_flags = --no-stub
build_flags =
  -Wall
  -Wextra
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DCORE_DEBUG_LEVEL=0
build_src_filter =
  +<main_s3.cpp>
